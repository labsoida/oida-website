label: "FAQ"
title: "Domande frequenti"
subtitle: "Le risposte alle domande che ricorrono nelle conversazioni con direttori sanitari e responsabili marketing delle strutture che valutano un partner."

items:
  - q: "Quanto costa una campagna di marketing sanitario?"
    a: "Il costo dipende dalla specialità, dal mercato locale, dagli obiettivi della struttura e dallo stato di partenza della sua presenza digitale. Il nostro metodo parte sempre da un'analisi della struttura e degli obiettivi: solo dopo formuliamo una proposta dimensionata su quei dati specifici. La prima conversazione è sempre gratuita ed è dove definiamo insieme cosa ha senso fare e cosa no."

  - q: "In quanto tempo si vedono i primi risultati?"
    a: "Dipende dalla combinazione di strumenti. Le campagne pubblicitarie producono primi lead in 2-4 settimane. I risultati strutturali — quelli confrontabili con benchmark di settore — emergono tra il terzo e il sesto mese, quando la campagna ha raccolto dati sufficienti e il funnel a valle si è stabilizzato. Il posizionamento SEO e la reputazione digitale lavorano su un orizzonte di 6-12 mesi con effetti più duraturi."

  - q: "Lavorate solo con cliniche private o anche con singoli professionisti?"
    a: "Con entrambi, con una distinzione onesta. Il nostro metodo ha costi di impianto che una struttura ripartisce su più specialità e più volumi: per cliniche e poliambulatori è la configurazione più efficiente. Per il singolo professionista funziona quando il valore delle prestazioni giustifica l'investimento, come nelle specialità chirurgiche o implantologiche. Negli altri casi te lo diciamo alla prima conversazione e ti indirizziamo verso soluzioni più snelle."

  - q: "In quali aree geografiche operate?"
    a: "Italia, Svizzera (con focus particolare sul Canton Ticino) e Regno Unito. Siamo un'agenzia svizzera con sede a Lugano e team distribuito. Il fatto di operare attivamente sul mercato ticinese ci dà visibilità su dinamiche transfrontaliere (LAMAL, pazienti italiani di confine) che le agenzie italiane standard non gestiscono. Per il mercato UK lavoriamo con strutture private in inglese."

  - q: "Avete esperienza con la mia specialità?"
    a: "Abbiamo lavorato su una gamma ampia di specialità: ortopedia, cardiologia, dermatologia, ginecologia, fisioterapia, odontoiatria, medicina della riproduzione, oculistica, diagnostica per immagini. Le dinamiche di acquisizione cambiano in modo sostanziale tra specialità: la prima conversazione con un nuovo cliente parte sempre da un'analisi del posizionamento specifico, dei benchmark di conversione e della stagionalità della patologia di riferimento."

  - q: "C'è un periodo minimo di collaborazione?"
    a: "Per le attività continuative (gestione campagne, SEO, CRM, presidio social) il periodo minimo è di 6 mesi. Il motivo è tecnico: prima di quel tempo i dati raccolti non sono statisticamente sufficienti per ottimizzare in modo informato. Per consulenze strategiche puntuali (audit, riposizionamento, ingresso in un nuovo bacino) lavoriamo anche su progetti chiusi di 1-3 mesi."

  - q: "Come gestite la compliance normativa sulla pubblicità sanitaria?"
    a: "La pubblicità sanitaria in Italia è regolata dalla Legge 175/1992 e dal Codice di Deontologia Medica; in Svizzera dalla legge cantonale sulla sanità e dalle norme deontologiche FMH. Ogni comunicazione che produciamo per i nostri clienti viene verificata rispetto a questi vincoli (no claim non documentabili, no comparativa diretta, gestione corretta delle testimonianze). È uno dei motivi per cui un'agenzia generalista in questo settore opera con un rischio che noi non corriamo: lo conosciamo dall'interno."
