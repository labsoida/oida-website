label: "Servizi"
title: "Cosa Facciamo"
subtitle: "Dal lancio della prima campagna alla creazione della tua prima sala operatoria."
cards:
  - icon: "compass"
    title: "Consulenza Strategica"
    pain: "Non sai da dove partire?"
    solution: "Analizziamo il tuo contesto e ti diciamo cosa fare, in che ordine, con quali priorità."
  - icon: "target"
    title: "Digital Marketing & ADV"
    pain: "I pazienti ci sono. Ma non ti trovano."
    solution: "Campagne digitali costruite per il settore sanitario. Risultati misurabili."
  - icon: "globe"
    title: "Sviluppo Web — SEO & GEO"
    pain: "Il tuo sito non ti porta pazienti?"
    solution: "Lo rifacciamo. E facciamo in modo che Google ti trovi per primo."
  - icon: "cpu"
    title: "Intelligenza Artificiale"
    pain: "L'AI sta cambiando la sanità. Tu sei pronto?"
    solution: "Ti aiutiamo a integrare strumenti di intelligenza artificiale nei tuoi processi. Senza hype, solo ciò che funziona."
  - icon: "database"
    title: "CRM & Automation"
    pain: "Quanti contatti stai perdendo?"
    solution: "Automazioni per seguire ogni richiesta senza perderne nessuna."
  - icon: "users"
    title: "Talent Acquisition"
    pain: "Ti manca personale sanitario?"
    solution: "Rendiamo la tua struttura attrattiva per i professionisti sanitari. Saranno loro a trovarti."
