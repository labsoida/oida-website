label: "Servizi"
title: "Cosa Facciamo"
subtitle: "Dal lancio della prima campagna alla realizzazione della tua prima sala operatoria."
# Gruppi della pagina /servizi/ (ordine = numerazione /NN, usato anche dalle singole)
groups:
  - "Crescita e Acquisizione"
  - "Operations e Tecnologia"
  - "Specialistici e Differenzianti"
cards:
  - icon: "compass"
    title: "Consulenza Strategica"
    pain: "Non sai da dove partire?"
    solution: "Analizziamo il tuo contesto e ti diciamo cosa fare, in che ordine, con quali priorità."
    url: "/servizi/consulenza-strategica-sanitaria/"
  - icon: "target"
    title: "Digital Marketing & ADV"
    pain: "I pazienti ci sono. Ma non ti trovano."
    solution: "Campagne digitali costruite per il settore sanitario. Risultati misurabili."
    url: "/servizi/advertising-sanitario/"
  - icon: "globe"
    title: "Siti Web per la Sanità"
    pain: "Il tuo sito non ti porta pazienti?"
    solution: "Lo rifacciamo. Progettato per trasformare le visite in richieste di contatto."
    url: "/servizi/siti-web-sanitari/"
  - icon: "globe"
    title: "SEO & GEO"
    pain: "Su Google e nelle risposte delle AI non compari?"
    solution: "Posizionamento nei motori di ricerca e negli assistenti AI. Visibilità che resta."
    url: "/servizi/seo-geo-sanita/"
  - icon: "cpu"
    title: "Intelligenza Artificiale"
    pain: "L'AI sta cambiando la sanità. Tu sei pronto?"
    solution: "Ti aiutiamo a integrare strumenti di intelligenza artificiale nei tuoi processi. Senza hype, solo ciò che funziona."
    url: "/servizi/intelligenza-artificiale-sanita/"
  - icon: "database"
    title: "CRM & Automation"
    pain: "Quanti contatti stai perdendo?"
    solution: "Automazioni per seguire ogni richiesta senza perderne nessuna."
    url: "/servizi/crm-automation-sanita/"
  - icon: "newspaper"
    title: "Ufficio Stampa e PR"
    pain: "Nessuno parla di te?"
    solution: "Media relations e comunicazione istituzionale per la sanità. Credibilità costruita sui media giusti."
    url: "/servizi/ufficio-stampa-sanita/"
  - icon: "users"
    title: "Talent Acquisition"
    pain: "Ti manca personale sanitario?"
    solution: "Rendiamo la tua struttura attrattiva per i professionisti sanitari. Saranno loro a trovarti."
    url: "/servizi/talent-acquisition-sanita/"
  - icon: "building"
    title: "Progettazione Ambienti Chirurgici"
    pain: "Vuoi aprire una sala operatoria o un ambulatorio chirurgico?"
    solution: "Fattibilità, compliance normativa, selezione strumentari. La competenza clinica che serve per farlo bene."
    url: "/servizi/progettazione-ambienti-chirurgici/"
