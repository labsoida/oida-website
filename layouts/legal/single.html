{{ define "main" }}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <a href="{{ "/" | relURL }}">Home</a><span class="sep">/</span><span class="current">{{ .Title }}</span>
</nav>

<header class="legal-head starry">
  <div class="list-kicker">// Documento legale</div>
  <h1>{{ .Title }}</h1>
  {{ with .Params.updated }}<p class="list-count">// Ultimo aggiornamento: {{ . }}</p>{{ end }}
</header>

<div class="legal-body">
  {{ .Content }}
</div>

{{ partial "planet-rise.html" . }}
{{ partial "footer.html" . }}
{{ end }}
