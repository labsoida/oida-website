<!DOCTYPE html>
<html lang="it">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M3B73NRN"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <header class="site-header" id="site-header">
    <nav class="site-header__nav" aria-label="Navigazione principale">
      <a href="{{ "/" | relURL }}" class="site-header__logo-link" aria-label="Oida Labs — Home">
        <img src="{{ "img/logo.png" | relURL }}" alt="Oida Labs — Agenzia di Marketing Sanitario" class="site-header__logo" fetchpriority="high" decoding="async">
      </a>
      <div class="site-header__links" id="site-header-links">
        <a href="{{ "servizi/" | relURL }}" class="site-header__link">Servizi</a>
        <a href="{{ "blog/" | relURL }}" class="site-header__link">Blog</a>
        <a href="{{ "insights/" | relURL }}" class="site-header__link">Insight</a>
      </div>
      <button class="site-header__toggle" id="site-header-toggle" aria-label="Apri menu" aria-expanded="false" aria-controls="site-header-links">
        <span class="site-header__toggle-bar"></span>
        <span class="site-header__toggle-bar"></span>
        <span class="site-header__toggle-bar"></span>
      </button>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <button class="back-to-top" id="backToTop" aria-label="Torna in cima">&uarr;</button>
  <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>
