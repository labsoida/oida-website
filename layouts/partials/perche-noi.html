{{ $d := hugo.Data.perche_noi }}
<section id="perche">
  <div class="s-header dusted">
    <div class="s-num">03</div>
    <div class="s-titlebox"><div class="s-label">// {{ $d.label }}</div><div class="s-title">{{ $d.title }}</div></div>
    <div class="s-toggle" aria-hidden="true">+</div>
  </div>
  <div class="section-body">
    <div class="perche-grid">
      {{ range $d.reasons }}
      <div class="perche-cell">
        <div class="perche-marker">/{{ .number }}</div>
        <div class="perche-h">{{ .title }}</div>
        <div class="perche-p">{{ .description }}</div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
