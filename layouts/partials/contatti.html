{{ $d := hugo.Data.contatti }}
<section id="contatti" class="cta-wrap">
  <div class="s-header dusted">
    <div class="s-num">06</div>
    <div class="s-titlebox"><div class="s-label">// {{ $d.label }}</div><button type="button" class="s-title s-disclose" aria-expanded="false" aria-controls="contatti-body">Parliamone</button></div>
    <div class="s-toggle" aria-hidden="true">+</div>
  </div>
  <div class="section-body" id="contatti-body">
    <div class="cta-final">
      <div class="cta-final-text">
        <h2>{{ $d.title }} <span>{{ $d.title_accent }}</span></h2>
        <p>{{ $d.subtitle }}</p>
        <div class="cta-meta">// NESSUN IMPEGNO &middot; ANALISI <b>GRATUITA</b> E PER ISCRITTO</div>
      </div>
      <form class="cta-form" action="https://formspree.io/f/{{ $d.formspree_id }}" method="POST" id="cta-form">
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
        <input type="hidden" name="origine" value="diretto">
        {{ range $d.fields }}
        {{ if eq .type "textarea" }}
        <textarea name="{{ .name }}" placeholder="{{ .placeholder }}" rows="5"{{ if .required }} required{{ end }} aria-label="{{ .placeholder }}"></textarea>
        {{ else }}
        <input type="{{ .type }}" name="{{ .name }}" placeholder="{{ .placeholder }}"{{ if .required }} required{{ end }} aria-label="{{ .placeholder }}">
        {{ end }}
        {{ end }}
        <label class="cta-privacy">
          <input type="checkbox" name="privacy_consent" required aria-label="Consenso privacy">
          <span>Ho letto la <a href="{{ "legal/privacy-policy/" | relURL }}" target="_blank" rel="noopener">Privacy Policy</a> e acconsento al trattamento dei miei dati per essere ricontattato.</span>
        </label>
        <button type="submit">{{ $d.submit_text }} &rarr;</button>
        <div class="cta-status" aria-live="polite"></div>
      </form>
    </div>
  </div>
</section>
