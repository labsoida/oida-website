{{ $d := hugo.Data.faqs }}
<section id="faq" class="faq-section">
  <div class="s-header dusted">
    <div class="s-num">05</div>
    <div class="s-titlebox"><div class="s-label">// {{ $d.label }}</div><div class="s-title">{{ $d.title }}</div></div>
    <div class="s-toggle" aria-hidden="true">+</div>
  </div>
  <div class="section-body">
    <div class="faq-wrap">
      {{ with $d.subtitle }}<div class="faq-intro">{{ . }}</div>{{ end }}
      {{ range $i, $f := $d.items }}
      <details>
        <summary><span class="faq-num">/{{ printf "%02d" (add $i 1) }}</span><span>{{ $f.q }}</span><span class="faq-plus">+</span></summary>
        <div>{{ $f.a }}</div>
      </details>
      {{ end }}
    </div>
  </div>
</section>
