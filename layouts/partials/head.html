<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Site.Title }}</title>
<meta name="description" content="{{ .Site.Params.description }}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Site.Title }}">
<meta property="og:description" content="{{ .Site.Params.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:locale" content="it_IT">
<meta property="og:site_name" content="Oida Labs">
{{ with .Site.Params.ogImage }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Site.Title }}">
<meta name="twitter:description" content="{{ .Site.Params.description }}">
{{ with .Site.Params.ogImage }}<meta name="twitter:image" content="{{ . | absURL }}">{{ end }}

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="{{ "img/favicon.ico" | relURL }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ "img/favicon-32.png" | relURL }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ "img/favicon-192.png" | relURL }}">
<link rel="apple-touch-icon" href="{{ "img/apple-touch-icon.png" | relURL }}">

<!-- Font preloads -->
<link rel="preload" href="{{ "fonts/glaseer-stencil.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ "fonts/bank-gothic.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}?v={{ now.Unix }}">

<!-- Schema.org: ProfessionalService -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Oida Labs",
  "url": "https://oida-labs.com",
  "email": "info@oida-labs.com",
  "description": "{{ .Site.Params.description }}",
  "knowsAbout": [
    "Marketing sanitario",
    "Digital marketing per cliniche",
    "SEO per strutture sanitarie",
    "CRM sanitario",
    "Intelligenza artificiale in sanità",
    "Ufficio stampa sanitario",
    "Progettazione ambienti chirurgici",
    "Talent acquisition sanitario"
  ],
  "areaServed": [
    { "@type": "Country", "name": "Italia" },
    { "@type": "Country", "name": "Svizzera" },
    { "@type": "Country", "name": "Regno Unito" }
  ],
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Servizi di marketing sanitario",
    "itemListElement": [
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Consulenza Strategica", "description": "Analisi, strategia e posizionamento per strutture sanitarie in crescita" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Digital Marketing & ADV", "description": "Campagne digitali costruite per il settore sanitario" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Sviluppo Web — SEO & GEO", "description": "Siti web ottimizzati per i motori di ricerca nel settore sanitario" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Intelligenza Artificiale", "description": "Integrazione di strumenti AI nei processi sanitari" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "CRM & Automation", "description": "Automazioni per la gestione dei contatti e dei pazienti" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Ufficio Stampa e PR", "description": "Media relations e comunicazione istituzionale per la sanità" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Talent Acquisition", "description": "Reclutamento e selezione di personale sanitario" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Progettazione Ambienti Chirurgici", "description": "Consulenza specialistica per ambulatori chirurgici e sale operatorie" } }
    ]
  }
}
</script>

<!-- Schema.org: FAQPage -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $card := .Site.Data.servizi.cards }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $card.pain }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $card.solution }}"
      }
    }
    {{- end }}
  ]
}
</script>
