{{ $d := .Site.Data.chi_siamo }}
<section class="chi-siamo" id="chi-siamo">
  <div class="container">
    <span class="section-label animate">{{ $d.label }}</span>
    <h2 class="section-title animate" data-animate-delay="100">{{ $d.title }}</h2>
    <p class="chi-siamo__subtitle animate" data-animate-delay="200">{{ $d.subtitle }}</p>
    <p class="chi-siamo__intro animate" data-animate-delay="300">{{ $d.intro }}</p>

    <div class="kpi-grid">
      {{ range $i, $kpi := $d.kpis }}
      <div class="kpi-card animate" data-animate-delay="{{ mul (add $i 4) 100 }}">
        <span class="kpi-card__number{{ if not $kpi.is_text }} counter{{ end }}"
          {{ if not $kpi.is_text }}data-target="{{ $kpi.numeric_value }}" data-suffix="{{ $kpi.suffix }}"{{ end }}>
          {{ $kpi.number }}
        </span>
        <span class="kpi-card__desc">{{ $kpi.description }}</span>
      </div>
      {{ end }}
    </div>

    <p class="chi-siamo__closing animate" data-animate-delay="700">{{ $d.closing }}</p>
  </div>
</section>
