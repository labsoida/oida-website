{{ $d := hugo.Data.chi_siamo }}
<section id="chi">
  <div class="s-header dusted">
    <div class="s-num">01</div>
    <div class="s-titlebox"><div class="s-label">// {{ $d.label }}</div><div class="s-title">{{ $d.title }}</div></div>
    <div class="s-toggle" aria-hidden="true">+</div>
  </div>
  <div class="section-body">
    <div class="chi-text">
      <p>{{ $d.intro }}</p>
      {{ with $d.body }}<p>{{ . }}</p>{{ end }}
      <p>{{ $d.closing }}</p>
    </div>
  </div>
</section>
