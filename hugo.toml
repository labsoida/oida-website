baseURL = "https://oida-labs.com/"
relativeURLs = true
languageCode = "it"
title = "OIDA Labs — Agenzia di Marketing Sanitario fondata da medici"
publishDir = "docs"
enableRobotsTXT = true
enableGitInfo = true
disableKinds = ["taxonomy", "term"]
rssLimit = 20

# lastmod reale dall'ultimo commit git che tocca il file (fallback: front matter, poi date)
[frontmatter]
  lastmod = ["lastmod", ":git", "date"]

# La build di produzione è sempre minificata (lo switch --minify diventa ridondante)
[minify]
  minifyOutput = true

# Articoli correlati per tag condivisi (usato in blog/single.html)
[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

# Custom output format: llms-full.txt (dump markdown completo per AI agents)
[outputFormats.LlmsFull]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

# Custom output format: llms.txt (indice standard llmstxt.org, rigenerato a ogni build)
[outputFormats.LlmsTxt]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

# Custom output format: per-page markdown variant for AI agents
# (es. /blog/foo/index.md affianca /blog/foo/index.html)
[outputFormats.AgentMd]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true
  notAlternative = false
  permalinkable = true

[outputs]
  home = ["HTML", "RSS", "LlmsFull", "LlmsTxt"]
  page = ["HTML", "AgentMd"]

[markup.goldmark.renderer]
  unsafe = true

[markup.goldmark.parser]
  # ID heading in ASCII puro (é→e): evita il mismatch tra id (é) e ancore TOC percent-encoded (%C3%A9)
  autoHeadingIDType = "github-ascii"
  [markup.goldmark.parser.attribute]
    block = true
    title = true

[params]
  description = "Agenzia di marketing sanitario fondata da medici: digital marketing, SEO, CRM e AI per cliniche e strutture sanitarie private in Italia, Svizzera e UK."
  ogImage = "img/og-image.jpg"
  gtmId = "GTM-M3B73NRN"
