baseURL = "https://oida-labs.com/"
relativeURLs = true
languageCode = "it"
title = "Oida Labs — Agenzia di Marketing Sanitario | Consulenza per Cliniche e Strutture Sanitarie"
publishDir = "docs"
enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# Custom output format: llms-full.txt (dump markdown completo per AI agents)
[outputFormats.LlmsFull]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

# Custom output format: per-page markdown variant for AI agents
# (es. /blog/foo/index.md affianca /blog/foo/index.html)
[outputFormats.AgentMd]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true
  notAlternative = false
  permalinkable = true

[outputs]
  home = ["HTML", "RSS", "LlmsFull"]
  page = ["HTML", "AgentMd"]

[markup.goldmark.renderer]
  unsafe = true

[markup.goldmark.parser]
  [markup.goldmark.parser.attribute]
    block = true
    title = true

[params]
  description = "Agenzia di marketing sanitario fondata da medici. Digital marketing, SEO, CRM, AI, PR e consulenza operativa per cliniche, studi medici e strutture sanitarie in Italia, Svizzera e UK."
  ogImage = "img/og-image.jpg"
  keywords = "marketing sanitario, agenzia marketing sanitario, marketing per cliniche, marketing medico, SEO sanitario, digital marketing sanità, consulenza marketing sanitario, CRM cliniche, marketing strutture sanitarie"
